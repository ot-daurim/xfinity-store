services:
  postgres:
    image: 'postgres:17'
    container_name: xfinity-store-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: xfinity_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - '5433:5432'

    volumes:
      - xfinity_store_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xfinity_store"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  xfinity_store_postgres_data: