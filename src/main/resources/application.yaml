spring:
  application:
    name: xfinity-store

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  server:
    port: ${SERVER_PORT:8080}

  management:
    endpoints:
      web:
        exposure:
          include: health,info
    endpoint:
      health:
        probes:
          enabled: true